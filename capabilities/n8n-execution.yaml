      operations:
      - name: retryexecution
        method: POST
        description: Retry an execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: number
          required: true
    - name: executions-id-stop
