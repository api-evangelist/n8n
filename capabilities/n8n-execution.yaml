        description: Retrieve an execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: number
          required: true
        - name: includeData
          in: query
          type: boolean
      - name: deleteexecution
        method: DELETE
        description: Delete an execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: number
          required: true
    - name: executions-id-retry
