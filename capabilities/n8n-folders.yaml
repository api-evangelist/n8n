naftiko: 1.0.0-alpha2
info:
  label: n8n Public API — Folders
  description: 'n8n Public API — Folders. 5 operations. Lead operation: List folders in a project. Self-contained Naftiko
    capability covering one N8n business surface.'
  tags:
  - N8n
  - Folders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    N8N_API_KEY: N8N_API_KEY
capability:
  consumes:
  - type: http
    namespace: n8n-folders
    baseUri: https://app.n8n.cloud/api/v1
    description: n8n Public API — Folders business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-folders
      path: /projects/{projectId}/folders
      operations:
      - name: listfolders
        method: GET
        description: List folders in a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
      - name: createfolder
        method: POST
        description: Create a folder in a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
    - name: projects-projectId-folders-folderId
      path: /projects/{projectId}/folders/{folderId}
      operations:
      - name: getfolder
        method: GET
        description: Get a folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: folderId
          in: path
          type: string
          required: true
      - name: deletefolder
        method: DELETE
        description: Delete a folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: folderId
          in: path
          type: string
          required: true
      - name: updatefolder
        method: PATCH
        description: Update a folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: folderId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.N8N_API_KEY}}'
  exposes:
  - type: rest
    namespace: n8n-folders-rest
    port: 8080
    description: REST adapter for n8n Public API — Folders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/projects/{projectid}/folders
      name: projects-projectid-folders
      description: REST surface for projects-projectId-folders.
      operations:
      - method: GET
        name: listfolders
        description: List folders in a project
        call: n8n-folders.listfolders
        with:
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createfolder
        description: Create a folder in a project
        call: n8n-folders.createfolder
        with:
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}/folders/{folderid}
      name: projects-projectid-folders-folderid
      description: REST surface for projects-projectId-folders-folderId.
      operations:
      - method: GET
        name: getfolder
        description: Get a folder
        call: n8n-folders.getfolder
        with:
          projectId: rest.projectId
          folderId: rest.folderId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletefolder
        description: Delete a folder
        call: n8n-folders.deletefolder
        with:
          projectId: rest.projectId
          folderId: rest.folderId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatefolder
        description: Update a folder
        call: n8n-folders.updatefolder
        with:
          projectId: rest.projectId
          folderId: rest.folderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: n8n-folders-mcp
    port: 9090
    transport: http
    description: MCP adapter for n8n Public API — Folders. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-folders-project
      description: List folders in a project
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: n8n-folders.listfolders
      with:
        projectId: tools.projectId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-folder-project
      description: Create a folder in a project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: n8n-folders.createfolder
      with:
        projectId: tools.projectId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-folder
      description: Get a folder
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: n8n-folders.getfolder
      with:
        projectId: tools.projectId
        folderId: tools.folderId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-folder
      description: Delete a folder
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: n8n-folders.deletefolder
      with:
        projectId: tools.projectId
        folderId: tools.folderId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-folder
      description: Update a folder
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: n8n-folders.updatefolder
      with:
        projectId: tools.projectId
        folderId: tools.folderId
      outputParameters:
      - type: object
        mapping: $.
