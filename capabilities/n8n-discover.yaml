naftiko: 1.0.0-alpha2
info:
  label: n8n Public API — Discover
  description: 'n8n Public API — Discover. 1 operations. Lead operation: Discover API capabilities. Self-contained Naftiko
    capability covering one N8n business surface.'
  tags:
  - N8n
  - Discover
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    N8N_API_KEY: N8N_API_KEY
capability:
  consumes:
  - type: http
    namespace: n8n-discover
    baseUri: https://app.n8n.cloud/api/v1
    description: n8n Public API — Discover business capability. Self-contained, no shared references.
    resources:
    - name: discover
      path: /discover
      operations:
      - name: discoverapi
        method: GET
        description: Discover API capabilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.N8N_API_KEY}}'
  exposes:
  - type: rest
    namespace: n8n-discover-rest
    port: 8080
    description: REST adapter for n8n Public API — Discover. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/discover
      name: discover
      description: REST surface for discover.
      operations:
      - method: GET
        name: discoverapi
        description: Discover API capabilities
        call: n8n-discover.discoverapi
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: n8n-discover-mcp
    port: 9090
    transport: http
    description: MCP adapter for n8n Public API — Discover. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: discover-api-capabilities
      description: Discover API capabilities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: n8n-discover.discoverapi
      outputParameters:
      - type: object
        mapping: $.
