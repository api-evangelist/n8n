  exposes:
  - type: rest
    port: 8080
    namespace: n8n-rest
    description: REST adapter for n8n Public API.
    resources:
    - path: /audit
      name: generateaudit
      operations:
      - method: POST
        name: generateaudit
        description: Generate an audit
        call: n8n.generateaudit
        outputParameters:
        - type: object
          mapping: $.
    - path: /credentials
      name: createcredential
      operations:
