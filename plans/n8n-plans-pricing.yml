specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: n8n
providerId: n8n
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Workflow
  - Automation
  - iPaaS
description: 'n8n Cloud tiers: Starter / Pro / Business / Enterprise (annual EUR pricing).'
sources:
  - https://n8n.io/pricing/
plans:
  - id: n8n-starter
    name: Starter
    type: paid
    description: €20/month annual; 2,500 workflow executions.
    entries:
      - label: Monthly (annual)
        name: monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: EU
        unit: 1
        price: 20.00 EUR
        userMultiplied: false
      - label: Workflow executions
        name: executions
        type: quota
        metric: execution
        limit: 2500
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 1 shared project
      - name: 5 concurrent executions
      - name: Unlimited users
      - name: 50 AI Workflow Builder credits
      - name: Forum support
  - id: n8n-pro
    name: Pro
    type: paid
    description: €50/month annual; 10,000 executions.
    entries:
      - label: Monthly (annual)
        name: monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: EU
        unit: 1
        price: 50.00 EUR
        userMultiplied: false
      - label: Workflow executions
        name: executions
        type: quota
        metric: execution
        limit: 10000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 3 shared projects
      - name: 20 concurrent executions
      - name: 7 days of insights
      - name: 150 AI credits
      - name: Admin roles
      - name: Global variables
      - name: Workflow history
