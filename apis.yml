apis:
  - aid: n8n:n8n
    name: n8n
    tags:
      - Artificial Intelligence
      - INtegrations
      - Agents
    humanURL: ' https://n8n.io/'
    properties:
      - url: ' https://n8n.io/'
        type: Documentation
    description: >-
      Build with the precision of code or the speed of drag-n-drop. Host with
      on-prem control or in-the-cloud convenience. n8n gives you more freedom to
      implement multi-step AI agents and integrate apps than any other tool.
  - aid: n8n:n8n-rest-api
    name: n8n REST API
    tags:
      - Automation
      - Workflows
      - Executions
      - Credentials
    humanURL: https://docs.n8n.io/api/
    baseURL: https://app.n8n.cloud/api/v1
    properties:
      - url: https://docs.n8n.io/api/
        type: Documentation
      - url: https://docs.n8n.io/api/api-reference/
        type: API Reference
      - url: https://docs.n8n.io/api/authentication/
        type: Authentication
    description: >-
      The n8n public REST API provides programmatic access to n8n instance
      resources including workflows, executions, credentials, users, tags, and
      variables. The API follows REST principles and requires API key
      authentication via the X-N8N-API-KEY header. All endpoints use the
      /api/v1 base path and return JSON responses.
